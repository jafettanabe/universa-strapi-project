services:
  strapi:
    build: .
    container_name: strapi
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: strapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: