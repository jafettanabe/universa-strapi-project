services:
  strapi:
    build: .
    container_name: strapi
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      # Todo `public`: el transfer necesita escribir backups de assets fuera de solo `uploads`.
      - ./public:/app/public
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: strapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: